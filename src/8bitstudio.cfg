MEMORY {
    ZP:      start = $0000, size = $0100, type = rw, define = yes;
    RAM:     start = $0200, size = $0600, type = rw, define = yes;
    HEADER:  start = $0000, size = $0010, type = ro, file = %O, fill = yes;
    PRG:     start = $8000, size = $7FFA, type = ro, file = %O, fill = yes, define = yes;
    VECTORS: start = $FFFA, size = $0006, type = ro, file = %O, fill = yes;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp;
    RAM:      load = RAM,     type = rw;
    HEADER:   load = HEADER,  type = ro;
    STARTUP:  load = PRG,     type = ro;
    CODE:     load = PRG,     type = ro;
    RODATA:   load = PRG,     type = ro;
    GAMEENGINE: load = PRG,   type = ro;
    EDITOR:   load = PRG,     type = ro;
    EDITORTOOLS: load = PRG,  type = ro;
    VECTORS:  load = VECTORS, type = ro;
}
